name: Prepare environment
description: Prepare required environment be the Seeneva project

runs:
  using: composite
  steps:
    - name: Install packages
      shell: bash
      run: sudo apt install autopoint

    # asdf-vm/actions@v3 is broken against current asdf (the Go rewrite on
    # `master`), so set up Java directly. Version mirrors .tool-versions
    # (temurin-17). Ruby is still handled by ruby/setup-ruby below.
    - name: Setup required Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Setup required Ruby
      uses: ruby/setup-ruby@v1
      with:
        bundler-cache: true

    - name: Cache Rust Cargo
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry
          ~/.cargo/git
          ./native/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('./native/**/Cargo.lock', '**/rust-toolchain') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Cache Gradle wrapper
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Validate Gradle Wrapper
      uses: gradle/wrapper-validation-action@v1