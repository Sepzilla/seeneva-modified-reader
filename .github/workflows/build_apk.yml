name: Build APK

# Manually triggered build that produces an unsigned, installable APK.
# It reuses the existing fork build lane, so it needs no signing secrets.
# Run it from the Actions tab ("Build APK" -> "Run workflow"), then download
# the "apk" artifact from the finished run.
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Gradle build type"
        required: true
        default: "Release"
        type: choice
        options:
          - Release
          - Debug

env:
  BUNDLE_WITHOUT: development
  FASTLANE_SKIP_UPDATE_CHECK: true

jobs:
  build:
    name: Build unsigned APK
    # Pinned to 22.04 so an older libclang (clang-12) is available for bindgen.
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare env
        uses: ./.github/actions/prepare_env

      # The native deps (libarchive-sys, tesseract-sys, leptonica-sys) use
      # bindgen 0.55/0.58, which need a 2020-era libclang to emit their FFI
      # constants correctly. Point bindgen at clang-12; the NDK's own clang
      # still performs the actual Android cross-compilation.
      - name: Install libclang for bindgen
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-12 libclang-12-dev llvm-12-dev
          echo "LIBCLANG_PATH=/usr/lib/llvm-12/lib" >> "$GITHUB_ENV"

      - name: Build unsigned APK
        run: |
          bundle exec fastlane pr_build_fork_apk build_type:"${{ inputs.build_type }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: ./app/build/outputs/apk
          if-no-files-found: error
